<script>
  function openVietJapanLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'giao_luu_van_hoa_Viet_Nhat');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('poster-viet-japan');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
