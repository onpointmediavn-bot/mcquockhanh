<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Handle Video Overlay Clicks
    const overlays = document.querySelectorAll('.custom-video-overlay');
    overlays.forEach(overlay => {
      overlay.addEventListener('click', function() {
        const iframe = this.nextElementSibling;
        const src = iframe.getAttribute('data-src');
        if (src) {
          iframe.setAttribute('src', src);
          // Fade out the overlay
          this.style.opacity = '0';
          setTimeout(() => {
            this.style.display = 'none';
          }, 500);
        }
      });
    });

    // 2. Handle View More Button
    const loadMoreBtn = document.getElementById('showreel-load-more-btn');
    const loadMoreContainer = document.getElementById('showreel-load-more-container');
    const hiddenItems = document.querySelectorAll('.showreel-item.hidden');
    
    if (hiddenItems.length === 0 && loadMoreContainer) {
      loadMoreContainer.style.display = 'none';
    }

    if (loadMoreBtn) {
      loadMoreBtn.addEventListener('click', () => {
        // Show all hidden items with a fade-in effect
        hiddenItems.forEach((item, index) => {
          item.classList.remove('hidden');
          item.style.opacity = '0';
          item.style.transform = 'translateY(20px)';
          
          setTimeout(() => {
            item.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            item.style.opacity = '1';
            item.style.transform = 'translateY(0)';
          }, index * 100); // Stagger effect
        });
        
        // Hide the button container after expanding
        if (loadMoreContainer) {
          loadMoreContainer.style.display = 'none';
        }
      });
    }
  });
</script>
