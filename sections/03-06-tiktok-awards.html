<script>
  function openMiniConcertLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'Glory_Sol_1125');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('poster-glorysol');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
