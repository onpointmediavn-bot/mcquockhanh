<script>
  function openIbsaLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'bo sung/ibsa');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('poster-joint-seminar');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
