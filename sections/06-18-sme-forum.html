<script>
  function openSmeLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'JCI_HANOI');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('poster-smes-startup');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
