<script>
  function openDiamondLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'KickOff_GD_2_Daimond_Paragon_BG');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('blockbuster-3');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
