<script>
  function openEurowindowLightbox(imgName) {
    if (typeof openLightbox === 'function' && typeof IMAGES_DATA !== 'undefined') {
      const albumIdx = IMAGES_DATA.findIndex(a => a.folderName === 'bo sung/eurowindown');
      if (albumIdx !== -1) {
        const imagesList = getSectionImages('poster-eurowindow');
        const imgIdx = imagesList.findIndex(img => img.includes(imgName));
        openLightbox(albumIdx, imgIdx !== -1 ? imgIdx : 0, imagesList);
      }
    }
  }
</script>
